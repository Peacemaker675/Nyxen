services:
  db:
    image: postgres:18.4
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
    stop_signal: SIGINT  
    stop_grace_period: 2s

volumes:
  postgres_data: